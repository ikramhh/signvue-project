version: "3.9"

services:
  traefik:
    image: traefik:v2.10
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "9080:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - signvue-net

  consul:
    image: hashicorp/consul:1.19
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"
    networks:
      - signvue-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - signvue-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signvue
      POSTGRES_PASSWORD: signvue
      POSTGRES_DB: signvue
    ports:
      - "5433:5432"
    networks:
      - signvue-net

  auth-service:
    build: ./services/auth-service
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://signvue:signvue@postgres:5432/signvue
      JWT_SECRET: signvue-secret
    depends_on:
      - postgres
    networks:
      - signvue-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=signvue-net
      - traefik.http.routers.auth.rule=PathPrefix(`/auth`)
      - traefik.http.middlewares.auth-strip.stripprefix.prefixes=/auth
      - traefik.http.routers.auth.middlewares=auth-strip
      - traefik.http.services.auth.loadbalancer.server.port=3001

  api-service:
    build: ./services/api-service
    environment:
      PORT: "3002"
      DATABASE_URL: postgresql://signvue:signvue@postgres:5432/signvue
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CONSUL_HOST: consul
    depends_on:
      - postgres
      - rabbitmq
      - auth-service
    networks:
      - signvue-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=signvue-net
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.middlewares.api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.api.middlewares=api-strip
      - traefik.http.services.api.loadbalancer.server.port=3002

  worker-service:
    build: ./services/worker-service
    environment:
      PORT: "3003"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CONSUL_HOST: consul
    depends_on:
      - rabbitmq
    networks:
      - signvue-net

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - signvue-net
    labels:
      - traefik.enable=true
      - traefik.docker.network=signvue-net
      - traefik.http.routers.web.rule=Host(`localhost`)
      - traefik.http.services.web.loadbalancer.server.port=80

networks:
  signvue-net:
    driver: bridge