<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SignVue — Reconnaissance de la langue des signes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="site-header">
    <div class="header-inner">
        <a class="logo" href="#accueil">
            <span class="logo-text">SignVue</span>
        </a>
    </div>
</header>

<main>

<!-- HERO -->
<section class="hero hero--accueil" id="accueil">

    <div class="hero-photo">
        <img class="hero-photo-img"
             src="./images/sign2.png"
             alt="Langue des signes"
             loading="eager">
    </div>

    <div class="hero-scrim"></div>

    <div class="hero-inner hero-inner--accueil">
        <div class="hero-copy hero-copy--on-photo">
            <h1>Reconnaissance de la langue des signes</h1>
            <p class="hero-lead">Traduction en temps réel grâce à l’IA.</p>
        </div>
    </div>
</section>

<!-- FEATURES -->
<section class="features">

    <h2 class="section-title">Fonctionnalités</h2>

    <div class="feature-grid">

        <div class="feature-card">
            <img src="./images/sign3.png" alt="Reconnaissance en direct">
            <h3>Reconnaissance en direct</h3>
            <p>Détection des gestes en temps réel.</p>
        </div>

        <div class="feature-card">
            <img src="./images/sign4.png" alt="Texte et voix">
            <h3>Texte & voix</h3>
            <p>Conversion automatique en texte et audio.</p>
        </div>

        <div class="feature-card">
            <img src="./images/sign5.png" alt="Sécurité">
            <h3>Vie privée</h3>
            <p>Aucune vidéo stockée.</p>
        </div>

    </div>

</section>

</main>

<footer class="site-footer">
    <p>© SignVue</p>
</footer>

</body>
</html>
